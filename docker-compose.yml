version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: boombros3d-db
    environment:
      POSTGRES_DB: boombros3d_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  pgdata:
    driver: local
